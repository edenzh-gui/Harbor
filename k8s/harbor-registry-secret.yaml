apiVersion: v1
kind: Secret
metadata:
  name: harbor-login-secret
  namespace: default
# зұ»еһӢеҝ…йЎ»жҳ?kubernetes.io/dockerconfigjson
type: kubernetes.io/dockerconfigjson
data:
  # иҝҷйҮҢзҡ?.dockerconfigjson йңҖиҰҒжӮЁжүӢеҠЁ base64 зј–з ҒпјҢжҲ–иҖ…зӣҙжҺҘдҪҝз”?kubectl create secret е‘Ҫд»Өз”ҹжҲҗ
  # еҰӮжһңжғіз”ЁиҜ?yaml еҲӣе»әпјҢиҜ·з”Ёд»ҘдёӢе‘Ҫд»Өз”ҹжҲ?base64 е№¶жӣҝжҚўдёӢж–№еҚ дҪҚз¬Ұпј?  # echo -n '{"auths":{"192.168.9.41:30002":{"username":"admin","password":"Harbor12345","auth":"YWRtaW46SGFyYm9yMTIzNDU="}}}' | base64 -w 0
  .dockerconfigjson: <BASE64_ENCODED_AUTH_JSON>
